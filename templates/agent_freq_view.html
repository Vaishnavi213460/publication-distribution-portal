{% extends 'agentheader.html' %}
{% block content %}
<div class="container py-4">
    <div class="card shadow-sm border-0" style="border-radius: 15px;">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-4 text-warning">
                <i class="fa fa-clock-o me-2"></i>Available Frequencies
            </h4>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th class="border-0 py-3">ID</th>
                            <th class="border-0 py-3">Frequency Cycle</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for i in list %}
                        <tr>
                            <td>#{{ i.id }}</td>
                            <td><span class="fw-bold text-dark">{{ i.frequency }}</span></td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="text-center py-4 text-muted">No frequency data available.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
