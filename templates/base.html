<!DOCTYPE html>
{% load static %}
<html lang="zxx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Publication Portal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css?family=Muli:300,400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header-section">
        <div class="container">
            <div class="inner-header">
                <div class="row">
                    <div class="col-lg-2"><div class="logo"><a href="/"><img src="{% static 'img/logo.png' %}" alt=""></a></div></div>
                    <div class="col-lg-7">
                        <div class="advanced-search">
                            <div class="input-group">
                                <input type="text" placeholder="Search publications...">
                                <button type="button"><i class="ti-search"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-item">
            <div class="container">
                <nav class="nav-menu mobile-menu">
                    <ul>
                        {% block navigation %}{% endblock %}
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    {% block hero_banner %}{% endblock %}

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer-section">
        </footer>

    <script src="{% static 'js/jquery-3.3.1.min.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
